services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campusbook}
      POSTGRES_USER: ${POSTGRES_USER:-campusbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campusbook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  api:
    image: campusbook-api-runtime
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://campusbook:campusbook@postgres:5432/campusbook?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_PORT: ${API_PORT:-3000}
      ORDER_PENDING_EXPIRE_SECONDS: ${ORDER_PENDING_EXPIRE_SECONDS:-900}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://campusbook.top,http://www.campusbook.top,https://campusbook.top,https://www.campusbook.top,http://localhost:5173}
    depends_on:
      - postgres
      - redis
    expose:
      - "3000"

  worker:
    image: campusbook-api-runtime
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    command: ["pnpm", "--filter", "api", "start:worker"]
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://campusbook:campusbook@postgres:5432/campusbook?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ORDER_PENDING_EXPIRE_SECONDS: ${ORDER_PENDING_EXPIRE_SECONDS:-900}
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://api.campusbook.top}
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/.runtime/certbot/www:/var/www/certbot:ro

volumes:
  postgres_data:
  redis_data:
